version: '3.9'

services:

  redis:
    image: redis:7.2

    container_name: redis-rate-limiter

    ports:
      - "6379:6379"

    command: >
      redis-server
      --appendonly yes
      --save 60 1000

    volumes:
      - redis_data:/data

    restart: unless-stopped

  app-1:
    build: ../rate-limiter-service

    container_name: rate-limiter-app-1

    environment:
      SERVER_PORT: 8080

    depends_on:
      - redis

  app-2:
    build: ../rate-limiter-service

    container_name: rate-limiter-app-2

    environment:
      SERVER_PORT: 8080

    depends_on:
      - redis

  app-3:
    build: ../rate-limiter-service

    container_name: rate-limiter-app-3

    environment:
      SERVER_PORT: 8080

    depends_on:
      - redis

  nginx:
    image: nginx:latest

    container_name: nginx-rate-limiter

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - app-1
      - app-2
      - app-3

    restart: unless-stopped
  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    depends_on:
      - app-1
      - app-2
      - app-3

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
volumes:
  redis_data:
  grafana_data:
  prometheus_data:
